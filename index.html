<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkyText Ultra ✨</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root { 
            --accent: #ff8fab; --bg: #fff0f3; --panel: rgba(255, 255, 255, 0.95);
            --text: #7a4a51; --bubble-me: #ff8fab; --bubble-them: #ffffff;
        }
        body.theme-dark {
            --accent: #ff758f; --bg: #0f0c29; --panel: rgba(20, 20, 40, 0.98);
            --text: #e0e0e0; --bubble-me: #ff758f; --bubble-them: #252545;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; 
            margin: 0; height: 100vh; background: var(--bg); color: var(--text); 
            overflow: hidden; transition: 0.3s;
        }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .auth-card { background: white; padding: 30px; border-radius: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 300px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 15px; border: 1px solid #eee; outline: none; box-sizing: border-box; font-size: 16px; }

        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* SIDEBAR LOGIC */
        #sidebar { 
            width: 280px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.05); 
            display: flex; flex-direction: column; 
            position: absolute; left: 0; top: 0; bottom: 0; z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(15px);
        }
        
        #sidebar.hidden { transform: translateX(-100%); }

        @media (min-width: 801px) {
            #sidebar { position: relative; transform: translateX(0) !important; }
            #menu-btn { display: none; }
        }

        .sidebar-header { padding: 40px 20px 10px; }
        .nav-item { padding: 12px 18px; margin: 4px 12px; border-radius: 18px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .active { background: var(--accent); color: white; }
        
        #main-view { flex: 1; display: flex; flex-direction: column; width: 100%; background: var(--bg); }
        
        .top-bar { padding: 10px 15px; display: flex; align-items: center; gap: 15px; background: var(--panel); border-bottom: 1px solid rgba(0,0,0,0.05); }
        #menu-btn { font-size: 28px; background: none; border: none; color: var(--accent); cursor: pointer; padding: 0; }

        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 10px 15px; border-radius: 18px; font-weight: 500; max-width: 75%; font-size: 15px; word-wrap: break-word; }
        .me { align-self: flex-end; background: var(--bubble-me); color: white; border-bottom-right-radius: 4px; }
        .them { align-self: flex-start; background: var(--bubble-them); color: inherit; border-bottom-left-radius: 4px; border: 1px solid rgba(0,0,0,0.02); }

        .input-bar { padding: 12px; background: var(--panel); display: flex; gap: 8px; align-items: center; }
        .msg-input { flex: 1; background: var(--bg); border: none; padding: 10px 15px; border-radius: 20px; font-size: 16px; color: var(--text); }
        .btn { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 15px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body class="theme-dark">

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color:var(--accent); margin:0 0 15px;">SkyText ✨</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button class="btn" style="width:100%; margin-top:10px;" onclick="auth('login')">Login</button>
        <button class="btn" style="width:100%; margin-top:10px; background:#f0f0f0; color:#888;" onclick="auth('signup')">Sign Up</button>
    </div>
</div>

<div class="app-container">
    <div id="sidebar" class="hidden">
        <div class="sidebar-header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; color:var(--accent);">SkyText ✨</h3>
                <button onclick="toggleSidebar()" style="background:none; border:none; font-size:20px; color:var(--accent);">✕</button>
            </div>
            <div style="display:flex; gap:8px; margin-top:15px;">
                <div style="width:20px; height:20px; background:#ff8fab; border-radius:50%;" onclick="setTheme('pink')"></div>
                <div style="width:20px; height:20px; background:#0f0c29; border-radius:50%; border:1px solid white;" onclick="setTheme('dark')"></div>
            </div>
        </div>
        
        <div class="nav-item active" id="global-btn" onclick="switchRoom('Global Chat')">🌍 Global Chat</div>
        <div style="padding:15px 20px 5px; font-size:10px; font-weight:800; opacity:0.5;">FIND FRIENDS</div>
        <div style="padding:0 15px; display:flex; gap:5px;"><input id="search" placeholder="Name..." style="padding:6px; font-size:13px;"><button class="btn" onclick="sendReq()">+</button></div>
        <div id="req-list"></div>
        <div id="friend-list" style="overflow-y:auto; flex:1;"></div>
        
        <div style="padding:15px; background:rgba(0,0,0,0.03); display:flex; align-items:center; gap:10px;">
            <div id="my-name" style="font-weight:700; font-size:13px;">User</div>
            <div style="margin-left:auto; font-size:10px; opacity:0.5; cursor:pointer;" onclick="logout()">LOGOUT</div>
        </div>
    </div>

    <div id="main-view">
        <div class="top-bar">
            <button id="menu-btn" onclick="toggleSidebar()">☰</button>
            <div id="current-room-name" style="font-weight:700;">Global Chat</div>
        </div>
        <div id="messages"></div>
        <div id="typing" style="padding:0 15px 5px; font-size:11px; height:15px; color:var(--accent);"></div>
        <form id="form" class="input-bar">
            <input id="input" class="msg-input" placeholder="Message..." autocomplete="off">
            <button class="btn">➤</button>
        </form>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myName = "", currentRoom = "", onlineUsers = [];

    // --- AUTO LOGIN CHECK ---
    window.onload = () => {
        const saved = localStorage.getItem('skytext_user');
        if (saved) loginSuccess(saved);
    };

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }
    function setTheme(t) { document.body.className = t === 'dark' ? 'theme-dark' : ''; }

    async function auth(type) {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        if(!u || !p) return;
        const res = await fetch('/' + type, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u, password: p}) });
        if (res.ok) {
            if (type === 'signup') return alert("Done! Now Login.");
            loginSuccess(u);
        } else alert("Error! Check credentials.");
    }

    function loginSuccess(u) {
        myName = u;
        localStorage.setItem('skytext_user', u);
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('my-name').innerText = u;
        socket.emit('register user', u);
        refreshData();
        switchRoom('Global Chat');
    }

    function logout() {
        localStorage.removeItem('skytext_user');
        location.reload();
    }

    async function refreshData() {
        const res = await fetch('/user-data/' + myName);
        const data = await res.json();
        const fList = document.getElementById('friend-list');
        fList.innerHTML = '';
        (data.friends || []).forEach(f => {
            fList.innerHTML += `<div class="nav-item" onclick="switchDM('${f}')">👤 ${f}</div>`;
        });
        const rList = document.getElementById('req-list');
        rList.innerHTML = '';
        (data.requests || []).forEach(r => {
            rList.innerHTML += `<div class="nav-item" style="font-size:12px;">💌 ${r} <button onclick="accept('${r}')" class="btn" style="padding:2px 8px; margin-left:auto;">OK</button></div>`;
        });
    }

    function switchRoom(room) {
        currentRoom = room;
        document.getElementById('messages').innerHTML = '';
        document.getElementById('current-room-name').innerText = room.startsWith("DM_") ? "Private Chat" : room;
        socket.emit('join room', room);
        if (window.innerWidth <= 800) document.getElementById('sidebar').classList.add('hidden');
    }

    function switchDM(f) {
        const room = "DM_" + [myName, f].sort().join("_");
        switchRoom(room);
    }

    socket.on('load history', (h) => h.forEach(addMsg));
    socket.on('chat message', (m) => { if(m.room === currentRoom) addMsg(m); });

    function addMsg(m) {
        const div = document.createElement('div');
        div.className = `bubble ${m.user === myName ? 'me' : 'them'}`;
        div.innerHTML = `<div style="font-size:10px; opacity:0.5; margin-bottom:3px;">${m.user}</div>${m.text}<div style="font-size:9px; opacity:0.4; margin-top:3px; text-align:right;">${m.time}</div>`;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = 999999;
    }

    async function sendReq() {
        const to = document.getElementById('search').value.trim();
        await fetch('/send-request', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({from: myName, to}) });
        document.getElementById('search').value = '';
        alert("Request Sent!");
    }

    async function accept(f) {
        await fetch('/accept-request', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user: myName, friend: f}) });
        refreshData();
    }

    document.getElementById('form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('input');
        if(input.value.trim()) {
            socket.emit('chat message', { user: myName, text: input.value, room: currentRoom });
            input.value = '';
        }
    };
</script>
</body>
</html>
