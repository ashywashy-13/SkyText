<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkyText Ultra ✨</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3222/3222800.png">

    <style>
        :root { 
            --accent: #ff8fab; --bg: #fff0f3; --panel: rgba(255, 255, 255, 0.7);
            --text: #7a4a51; --bubble-me: #ff8fab; --bubble-them: #ffffff;
        }
        body.theme-dark {
            --accent: #ff758f; --bg: #0f0c29; --panel: rgba(20, 20, 40, 0.8);
            --text: #e0e0e0; --bubble-me: #ff758f; --bubble-them: #252545;
        }

        body { 
            font-family: 'SF Pro Display', -apple-system, sans-serif; 
            margin: 0; height: 100vh; background: var(--bg); color: var(--text); 
            overflow: hidden; transition: 0.5s;
        }
        
        /* Login Screen */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: white; padding: 50px; border-radius: 40px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 320px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 20px; border: 1px solid #eee; outline: none; box-sizing: border-box; font-weight: 700; font-size: 16px; }

        .app-container { display: flex; height: 100vh; }

        /* Sidebar */
        #sidebar { width: 300px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .sidebar-header { padding: 40px 25px 20px; }
        .nav-item { padding: 12px 20px; margin: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: 800; display: flex; align-items: center; gap: 10px; transition: 0.2s; position: relative; }
        .active { background: var(--accent) !important; color: white !important; box-shadow: 0 5px 15px rgba(255, 117, 143, 0.3); }
        
        .online-dot { width: 8px; height: 8px; background: #bbb; border-radius: 50%; }
        .online-active { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }

        /* Unread Badge */
        .unread-badge {
            background: var(--accent); color: white; font-size: 10px; font-weight: 900;
            padding: 2px 8px; border-radius: 10px; margin-left: auto;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Chat View */
        #main-view { flex: 1; display: flex; flex-direction: column; position: relative; }
        #messages { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { padding: 14px 20px; border-radius: 22px; font-weight: 600; max-width: 70%; line-height: 1.4; }
        .me { align-self: flex-end; background: var(--bubble-me); color: white; border-bottom-right-radius: 5px; }
        .them { align-self: flex-start; background: var(--bubble-them); color: inherit; border-bottom-left-radius: 5px; }
        .bubble img { max-width: 100%; border-radius: 15px; margin-top: 8px; display: block; }

        .input-bar { padding: 20px 30px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        .msg-input { flex: 1; background: var(--bg); border: none; padding: 15px 20px; border-radius: 25px; color: var(--text); }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 20px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body class="theme-dark" onclick="initNotifications()">

<div id="auth-overlay">
    <div class="auth-card">
        <h1 style="color:var(--accent); margin-bottom: 20px;">SkyText ✨</h1>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button class="btn" style="width:100%; margin-top:10px;" onclick="auth('login')">Login</button>
        <button class="btn" style="width:100%; margin-top:10px; background:#f0f0f0; color:#888;" onclick="auth('signup')">Sign Up</button>
    </div>
</div>

<div class="app-container">
    <div id="sidebar">
        <div class="sidebar-header">
            <h2 style="color:var(--accent); margin:0;">SkyText ✨</h2>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <div style="width:22px; height:22px; background:#ff8fab; border-radius:50%; cursor:pointer;" onclick="setTheme('pink')"></div>
                <div style="width:22px; height:22px; background:#0f0c29; border-radius:50%; cursor:pointer; border:1px solid white;" onclick="setTheme('dark')"></div>
            </div>
        </div>
        
        <div class="nav-item active" id="global-btn" onclick="switchRoom('Global Chat')">
            🌍 Global Chat <span id="unread-GlobalChat" class="unread-badge" style="display:none;">0</span>
        </div>
        
        <div style="padding:20px 25px 5px; font-size:11px; font-weight:900; opacity:0.5; letter-spacing: 1px;">FIND FRIENDS</div>
        <div style="padding:0 20px; display:flex; gap:5px;">
            <input id="search" placeholder="Username..." style="padding:10px; font-size:13px; margin:0;">
            <button class="btn" style="padding:0 15px;" onclick="sendReq()">+</button>
        </div>

        <div id="req-list"></div>
        <div id="friend-list" style="overflow-y:auto; flex:1;"></div>

        <div style="padding:20px; background:rgba(0,0,0,0.05); display:flex; align-items:center; gap:12px;">
            <div id="my-avatar" style="width:40px; height:40px; background:var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; font-weight:900; font-size:18px;">?</div>
            <div id="my-name" style="font-weight:800;">User</div>
            <div style="margin-left:auto; font-size:10px; cursor:pointer; opacity:0.4;" onclick="location.reload()">LOGOUT</div>
        </div>
    </div>

    <div id="main-view">
        <div id="messages"></div>
        <div id="typing" style="padding:0 40px 10px; font-size:12px; font-weight:800; color:var(--accent); height:15px;"></div>
        <form id="form" class="input-bar">
            <input id="input" class="msg-input" placeholder="Message or image link..." autocomplete="off">
            <button class="btn">SEND</button>
        </form>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myName = "", currentRoom = "", onlineUsers = [], unreadCounts = {};
    const pingSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    function setTheme(t) { document.body.className = t === 'dark' ? 'theme-dark' : ''; }

    function initNotifications() {
        if (Notification.permission !== 'granted') Notification.requestPermission();
    }

    async function auth(type) {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        if(!u || !p) return alert("Fill in the boxes! 🎀");
        
        const res = await fetch('/' + type, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({username: u, password: p}) 
        });

        if (res.ok) {
            if (type === 'signup') return alert("Account created! Now Login 🎀");
            const data = await res.json();
            loginSuccess(u, data);
        } else alert("Oops! Wrong login info. ❌");
    }

    function loginSuccess(u, data) {
        myName = u;
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('my-name').innerText = u;
        document.getElementById('my-avatar').innerText = u[0].toUpperCase();
        socket.emit('register user', u);
        refreshData();
        switchRoom('Global Chat');
    }

    async function refreshData() {
        const res = await fetch('/user-data/' + myName);
        const data = await res.json();
        renderSidebar(data.friends || [], data.requests || []);
    }

    function renderSidebar(friends, requests) {
        const rList = document.getElementById('req-list');
        rList.innerHTML = requests.length ? '<div style="padding:15px 25px 5px; font-size:11px; font-weight:900; opacity:0.5;">REQUESTS</div>' : '';
        requests.forEach(r => rList.innerHTML += `<div class="nav-item" style="background:#fff; color:#333; font-size:12px;">💌 ${r} <button onclick="accept('${r}')" style="margin-left:auto; border:none; background:var(--accent); color:white; border-radius:5px; padding:4px 8px; cursor:pointer;">Accept</button></div>`);

        const fList = document.getElementById('friend-list');
        fList.innerHTML = '<div style="padding:15px 25px 5px; font-size:11px; font-weight:900; opacity:0.5;">BESTIES</div>';
        friends.forEach(f => {
            const isOnline = onlineUsers.includes(f);
            const dmRoom = getDMRoom(f);
            const count = unreadCounts[dmRoom] || 0;
            
            fList.innerHTML += `
                <div class="nav-item" id="btn-${f}" onclick="switchDM('${f}')">
                    <div class="online-dot ${isOnline ? 'online-active' : ''}"></div>
                    👤 ${f}
                    <span id="unread-${f}" class="unread-badge" style="${count > 0 ? '' : 'display:none'}">${count}</span>
                </div>`;
        });
    }

    function getDMRoom(f) {
        const names = [myName, f].sort();
        return "DM_" + names[0] + "_" + names[1];
    }

    socket.on('online list', (list) => { onlineUsers = list; if(myName) refreshData(); });

    function switchRoom(room) {
        currentRoom = room;
        unreadCounts[room] = 0;
        document.getElementById('messages').innerHTML = "";
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        if(room === 'Global Chat') {
            document.getElementById('global-btn').classList.add('active');
            document.getElementById('unread-GlobalChat').style.display = 'none';
        }
        socket.emit('join room', room);
        refreshData(); 
    }

    function switchDM(f) {
        const room = getDMRoom(f);
        switchRoom(room);
        document.getElementById('btn-' + f)?.classList.add('active');
    }

    socket.on('load history', (history) => history.forEach(addMessage));
    
    socket.on('chat message', (data) => {
        if (data.room === currentRoom) {
            addMessage(data);
        } else {
            unreadCounts[data.room] = (unreadCounts[data.room] || 0) + 1;
            refreshData();
            if(data.room === "Global Chat") {
                const gb = document.getElementById('unread-GlobalChat');
                gb.innerText = unreadCounts[data.room];
                gb.style.display = 'inline-block';
            }
        }

        if (data.user !== myName) {
            pingSound.play().catch(() => {});
            if (document.hidden && Notification.permission === 'granted') {
                new Notification(`SkyText: ${data.user}`, { body: data.text });
            }
        }
    });

    function addMessage(data) {
        const isMe = data.user === myName;
        const div = document.createElement('div');
        div.className = `bubble ${isMe ? 'me' : 'them'}`;
        
        let content = data.text;
        // Image Detection
        if(data.text.match(/\.(jpeg|jpg|gif|png)$/)) content = `<img src="${data.text}">`;

        div.innerHTML = `
            ${!isMe ? `<div style="font-size:9px; font-weight:900; opacity:0.5; margin-bottom:4px;">${data.user}</div>` : ''}
            ${content}
            <div style="font-size:8px; text-align:right; opacity:0.4; margin-top:4px;">${data.time}</div>
        `;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = 999999;
    }

    async function sendReq() {
        const to = document.getElementById('search').value.trim();
        if(!to) return;
        await fetch('/send-request', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({from: myName, to}) 
        });
        alert("Friend request sent! ✨");
        document.getElementById('search').value = "";
    }

    async function accept(f) {
        await fetch('/accept-request', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({user: myName, friend: f}) 
        });
        refreshData();
    }

    const input = document.getElementById('input');
    input.addEventListener('input', () => {
        socket.emit('typing', { room: currentRoom, user: myName, isTyping: true });
        clearTimeout(window.t);
        window.t = setTimeout(() => socket.emit('typing', { room: currentRoom, user: myName, isTyping: false }), 1500);
    });

    socket.on('display typing', (data) => {
        if(data.room === currentRoom) {
            document.getElementById('typing').innerText = data.isTyping ? `${data.user} is typing...` : '';
        }
    });

    document.getElementById('form').onsubmit = (e) => {
        e.preventDefault();
        if (input.value.trim()) {
            socket.emit('chat message', { user: myName, text: input.value, room: currentRoom });
            input.value = '';
        }
    };
</script>
</body>
</html>
